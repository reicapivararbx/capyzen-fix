<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CapyZen Admin Login</title>
  <link rel="stylesheet" href="admin.css">
</head>
<body>
  <div class="auth-box">
    <h1>🛡️ Painel Administrativo</h1>
    <p class="subtitle">Acesso Restrito</p>
    
    <div class="form-group">
      <input id="user" type="text" placeholder="Usuário" class="input-field">
    </div>
    
    <div class="form-group">
      <input id="pass" type="password" placeholder="Senha" class="input-field">
    </div>
    
    <button onclick="login()" class="btn-primary">Entrar</button>
    
    <p class="hint">💡 Dica: Procure por pistas no jogo!</p>
  </div>

  <script src="admin.js"></script>
</body>
</html>
